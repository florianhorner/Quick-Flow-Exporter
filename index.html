<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Flow Exporter</title>
    <script>
      // Prevent flash of wrong theme by applying dark class before first paint
      (function () {
        var t = localStorage.getItem('qfe-theme');
        var dark =
          t === 'dark' ||
          (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
